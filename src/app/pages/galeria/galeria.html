<div class="container" style="padding-top: 110px; padding-bottom: 60px;">

  <div class="text-center mb-5">
    <h1 class="display-4 fw-bold mb-3" style="color: #c24f2e;">Galería</h1>
    <p class="lead" style="color: #aebab0;">Momentos capturados de nuestro recorrido musical.</p>
  </div>

  <div class="gallery-master-frame p-3 p-md-5 rounded-5 shadow-sm">
    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let foto of fotos">
        <div class="gallery-card">
          <img [src]="foto.url" [alt]="foto.alt">
        </div>
      </div>
    </div>
  </div>

</div>
